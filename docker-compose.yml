services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signage}
      POSTGRES_USER: ${POSTGRES_USER:-signage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-signageadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-this-minio-password}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://signage:change-this-postgres-password@postgres:5432/signage}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-signageadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-this-minio-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-signage-assets}
      PUBLIC_MEDIA_URL: ${PUBLIC_MEDIA_URL:-/media}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
      SIGNAGE_STATE_FILE: /data/signage-state.json
    volumes:
      - api_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      SERVER_API_URL: http://api:4000/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:8080}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - minio
    ports:
      - "8080:80"
      - "8443:443"

volumes:
  postgres_data:
  minio_data:
  api_data:
